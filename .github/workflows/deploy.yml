name: Deploy to EC2
on:
  push:
    branches:
      - main
  workflow_dispatch: 
           
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        
      #- name: Start httpd service
      #  run: |
     #     ssh -o StrictHostKeyChecking=no -i ${{ secrets.EC2_SSH_KEY }} ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} "sudo systemctl start httpd"

        
      - name: Copy files using scp
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          source: |
            index.html
            index.files/colorsschememapping.dml
            index.files/themedata.thmx
          target: "/var/www/html/"  

